    <h1>王大同</h1>
    <p>嗨！我是愛上網的狗。旺旺！</p>
    <img src="https://picsum.photos/200/300?image=1074" alt="隨機狗">

    <ul>
        <li>王功漁港的海灘</li>
        <li>儒林狗狗公園</li>
        <li>消防栓</li>
    </ul>
    <h2>我愛打電動</h2>
    <p>我超愛玩手機，雖然常被罵，但是就像看到電線桿或消防栓一樣忍不住。我收集了一些神奇寶貝：</p>
